# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect this repo in Render → New → Blueprint to create the service automatically.

services:
  - type: web
    name: article-to-print
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
